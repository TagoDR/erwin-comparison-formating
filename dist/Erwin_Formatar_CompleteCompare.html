	display: block;
	min-height: 100vh;
	background-color: #0f172a;
}

.main-content {
	position: relative;
}

.display-area {
	padding: 1.5rem;
	display: flex;
	flex-direction: column;
	gap: 1.5rem;
}

.loading-overlay {
	position: fixed;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background: rgba(15, 23, 42, 0.95);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	z-index: 2000;
	color: #f8fafc;
	gap: 1.5rem;
}

.spinner {
	width: 50px;
	height: 50px;
	border: 5px solid #334155;
	border-top: 5px solid #3b82f6;
	border-radius: 50%;
	animation: spin 1s linear infinite;
}

.loading-text {
	font-size: 1rem;
	font-weight: 600;
	color: #94a3b8;
	letter-spacing: 0.05em;
	text-transform: uppercase;
}

@keyframes spin {
	0% {
		transform: rotate(0deg);
	}
	100% {
		transform: rotate(360deg);
	}
}

.empty-state {
	display: flex;
	flex-direction: column;
	align-items: center;
	justify-content: center;
	padding-top: 10vh;
	color: #475569;
}

.empty-icon {
	font-size: 4rem;
	margin-bottom: 1rem;
}
`,lt=`:host {
	display: block;
	position: sticky;
	top: 0;
	z-index: 1000;
	background: #1e293b;
	border-bottom: 2px solid #334155;
	padding: 0.5rem 1.5rem;
	color: #f8fafc;
}

.header-layout {
	display: flex;
	align-items: center;
	justify-content: space-between;
	height: 2.5rem;
}

.brand {
	font-size: 1.125rem;
	font-weight: 800;
	letter-spacing: -0.025em;
	white-space: nowrap;
}

.file-drop-zone {
	flex: 1;
	margin: 0 3rem;
	border: 2px dashed #475569;
	border-radius: 6px;
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 0.75rem;
	padding: 0.1rem 1rem;
	font-size: 0.8125rem;
	color: #94a3b8;
	transition: all 0.2s ease;
	position: relative;
	cursor: pointer;
}

.file-drop-zone.dragging {
	border-color: #3b82f6;
	background: rgba(59, 130, 246, 0.1);
	color: #3b82f6;
}

.file-drop-zone input[type="file"] {
	position: absolute;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	opacity: 0;
	cursor: pointer;
}

	align-items: center;
	justify-content: center;
	gap: 1.5rem;

	border: 1px solid #334155;
}

.file-name {
	color: #3b82f6;
	font-weight: 600;
	font-family: monospace;
	font-size: 0.875rem;
}

.version-tag {
	position: absolute;
	top: 4px;
	right: 8px;
	font-size: 10px;
	color: var(--text-secondary);
	opacity: 0.7;
	font-weight: bold;
	pointer-events: none;
}

.timeline dl dt{position:relative;top:30px;z-index:200;width:120px;padding:3px 5px;margin:0 auto 30px;font-weight:400;color:#fff;text-align:center;background-color:#aab2bd;border-radius:4px;-webkit-border-radius:4px;-moz-border-radius:4px}

.timeline dl dd{position:relative;z-index:200}

.timeline dl dd .circ{position:absolute;top:40px;left:50%;z-index:200;width:22px;height:22px;margin-left:-11px;background-color:#4fc1e9;border:4px solid #f5f7fa;border-radius:50%;-webkit-border-radius:50%;-moz-border-radius:50%}

.timeline dl dd .time{position:absolute;top:31px;left:50%;display:inline-block;width:100px;padding:10px 20px;color:#4fc1e9}

.timeline dl dd .events{position:relative;width:47%;padding:10px 10px 0;margin-top:31px;background-color:#fff;border-radius:4px;-webkit-border-radius:4px;-moz-border-radius:4px}

.timeline dl dd .events:before{position:absolute;top:12px;width:0;height:0;content:'';border-style:solid;border-width:6px}

.timeline dl dd .events .events-object{margin-right:10px}

.timeline dl dd .events .events-body{overflow:hidden;zoom:1}

.timeline dl dd .events .events-body .events-heading{margin:0 0 10px;font-size:14px}

.timeline dl dd.pos-right .time{margin-left:-100px;text-align:right}

.timeline dl dd.pos-right .events{float:right}

.timeline dl dd.pos-right .events:before{left:-12px;border-color:transparent #fff transparent transparent}

.timeline dl dd.pos-left .time{margin-left:0;text-align:left}

.timeline dl dd.pos-left .events{float:left}

.timeline dl dd.pos-left .events:before{right:-12px;border-color:transparent transparent transparent #fff}

.dropdown-menu{background-color:#434a54;border:none}

.dropdown-menu .dropdown-header{padding:5px 20px;font-size:14px;font-weight:700;color:#aab2bd}

.dropdown-menu li a{padding:5px 20px;color:#fff}

.dropdown-menu .active a,.dropdown-menu .active a:focus,.dropdown-menu .active a:hover,.dropdown-menu li a:focus,.dropdown-menu li a:hover{color:#fff;background-color:#656d78;outline:0}

.dropdown-menu .disabled a,.dropdown-menu .disabled a:focus,.dropdown-menu .disabled a:hover{color:#656d78;cursor:default}

.dropdown-menu .divider{background-color:#656d78;border-bottom:none}

.dropup .dropdown-menu{margin-bottom:0;border-radius:4px 4px 0 0;-webkit-border-radius:4px 4px 0 0;-moz-border-radius:4px 4px 0 0}

.dropdown-submenu{position:relative}

.dropdown-submenu .dropdown-menu{top:0;left:100%;margin-top:-6px;margin-left:-1px;border-radius:0 4px 4px;-webkit-border-radius:0 4px 4px;-moz-border-radius:0 4px 4px}

.dropdown-submenu:hover .dropdown-menu{display:block}

.dropup .dropdown-submenu .dropdown-menu{top:auto;bottom:0;margin-top:0;margin-bottom:-2px;border-radius:4px 4px 4px 0;-webkit-border-radius:4px 4px 4px 0;-moz-border-radius:4px 4px 4px 0}

.dropdown-submenu>a:after{display:block;float:right;width:0;height:0;margin-top:5px;margin-right:-10px;content:" ";border-color:transparent;border-style:solid;border-width:5px 0 5px 5px;border-left-color:#fff}

.dropdown-default .dropdown-submenu>a:after{border-left-color:#434a54}

.dropdown-submenu:hover a:after{border-left-color:#fff}

.dropdown-submenu.pull-left{float:none}

.dropdown-submenu.pull-left .dropdown-menu{left:-100%;margin-left:10px;border-radius:4px 0 4px 4px;-webkit-border-radius:4px 0 4px 4px;-moz-border-radius:4px 0 4px 4px}

/* --- Design System / Theme (Bootflat Inspired Dark Slate) --- */

:root {
	/* Layout Colors (Slate/Wet Asphalt) */
	--bg-main: #34495e;
	--bg-panel: #2c3e50;
	--text-primary: #f1f2f2;
	--text-secondary: #95a5a6;
	--border-subtle: #465c71;
	--accent-blue: #3498db; /* Peter River */

	/* Table Status (Pastels) */
	--status-I-bg: #e6f3e6; /* Pastel Green */
	--status-I-border: #2ecc71; /* Emerald */
	--status-I-text: #27ae60;

	/* Table Status (Pastels) */
	--status-A-bg: #f3e6ff; /* Pastel Purple */
	--status-A-border: #9b59b6; /* Amethyst */
	--status-A-text: #8e44ad;

	/* Table Status (Pastels) */
	--status-E-bg: #ffe6e6; /* Pastel Red */
	--status-E-border: #e74c3c; /* Alizarin */
	--status-E-text: #c0392b;

	/* Object Type Colors (Bootflat palette) */
	--color-obj-l0: #e67e22; /* Carrot */
	--color-obj-l1: #f39c12; /* Orange */
	--color-obj-l2: #1abc9c; /* Turquoise */
	--color-obj-l3: #16a085; /* Green Sea */
	--color-obj-l4: #3498db; /* Peter River */

	/* Neutral Status */
	--bg-empty: rgba(44, 62, 80, 0.95);
	--text-muted: #7f8c8d;
}

body {
	background-color: var(--bg-main);
	color: var(--text-primary);
	font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
	margin: 0;
}

/* Bootflat Overrides for Dark Mode */

.table {
	color: var(--text-primary);
	background: transparent;
	border: 1px solid var(--border-subtle);
	width: 100%;
}

.table thead {
	background-color: var(--bg-panel);
}

.table th {
	border-bottom: 2px solid var(--border-subtle);
	text-transform: uppercase;
	font-size: 0.75rem;
	letter-spacing: 0.05em;
	color: var(--text-secondary);
}

.table td {
	border-top: 1px solid var(--border-subtle);
}

.table-hover tbody tr:hover {
	background-color: rgba(255, 255, 255, 0.05);
}

.form-control {
	background-color: var(--bg-panel);
	color: white;
	border: 1px solid var(--border-subtle);
	border-radius: 4px;
}

.form-control:focus {
	border-color: var(--accent-blue);
	box-shadow: none;
}

label {
	color: var(--text-secondary);
	font-size: 0.75rem;
	margin-bottom: 0.25rem;
}

.btn-primary {
	background-color: var(--accent-blue);
	border-color: var(--accent-blue);
}

.btn-danger {
	background-color: var(--status-E-border);
	border-color: var(--status-E-border);
}

/* Remove Glyphicons dependency */

@font-face {
	font-family: "Glyphicons Halflings";
	src: local("sans-serif");
}
